version: '3.8'

services:
  # Наш Java-бэкенд
  backend-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: corporate-news-backend
    ports:
      - "8080:8080"
    restart: unless-stopped

  # Наш Angular-фронтенд
  frontend-service:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: corporate-news-frontend
    ports:
      - "4200:80" # Открываем функционал на порту 4200, как просит ТЗ!
    depends_on:
      - backend-service
    restart: unless-stopped
